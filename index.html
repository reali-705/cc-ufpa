<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>No Man Sky</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

    <!-- Tela de Login -->
    <div id="login-screen" class="login-screen">
        <div class="login-panel">
            <h2>Novo Jogo ou Carregar</h2>
            <input type="text" id="inputNomeJogador" placeholder="Nome do Jogador">
            <input type="password" id="inputSenhaJogador" placeholder="Senha">
            <button id="iniciarJogo">Iniciar Aventura</button>
            <p id="mensagemLogin" style="color: #ff6a6a; margin-top: 1rem;"></p>
        </div>
    </div>

    <!-- Container Principal do Jogo (Inicialmente escondido) -->
    <div id="game-container" class="container-principal hidden">
        <h1>No Man's Sky</h1>

        <!-- Menu Retrátil (Salvar/Carregar) -->
        <div class="menu-container">
            <details class="menu-suspenso">
                <summary class="menu-toggle" aria-label="Abrir Menu">
                    <i class="fas fa-bars icone"></i>
                </summary>
                <div class="menu-opcoes">
                    <button id="salvar">Salvar</button>
                    <button id="carregar">Carregar</button>
                    <button id="novoJogo">Novo Jogo</button>
                </div>
            </details>
        </div>

        <!-- Seções do Jogo -->
        <div class="secoes-info">
            <div class="info-painel">
                <h2>Status do Jogador</h2>
                <h3 id="nomePersonagem">Nome: ...</h3>
                <h3 id="vidaPersonagem">Vida: ...</h3>
                <h3 id="escudoPersonagem">Escudo: ...</h3>
            </div>
            <div class="info-painel">
                <h2>Informações do Planeta</h2>
                <h3 id="posicao">Planeta: ... - Bioma: ...</h3>
                <h3 id="recursos">Recursos: ...</h3>
            </div>
        </div>

        <div class="info-painel acoes-botoes">
            <h2>Ações do Jogador</h2>
            <button id="irOeste">Ir para o Oeste</button>
            <button id="irLeste">Ir para o Leste</button>
            <button id="minerar">Minerar</button>
            <button id="mostrarInventario">Mostrar Inventário</button>
        </div>

        <div class="info-painel">
            <h2>Saídas do Jogo</h2>
            <pre id="saida"></pre>
        </div>
    </div>

    <script type="module" src="./Javascript/main.js"></script>
</body>
</html>
